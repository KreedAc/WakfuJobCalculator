name: Probe game data

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Probe equipment data from Ankama CDN
        run: node --max-old-space-size=4096 scripts/probe-equipment-data.mjs
